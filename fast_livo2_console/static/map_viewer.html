<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JR Map Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; color: #17202a; background: #eef1f4; }
    header { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #d6dde5; }
    h1 { margin: 0; font-size: 20px; }
    main { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 57px); }
    aside { border-right: 1px solid #d6dde5; background: #fff; overflow: auto; padding: 12px; }
    button { min-height: 42px; border: 1px solid #cfd8e2; border-radius: 8px; background: #f8fafb; color: #17202a; font-weight: 700; }
    button.primary, button.active { background: #087f8c; border-color: #087f8c; color: #fff; }
    .map { border: 1px solid #d6dde5; border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #f8fafb; }
    .map strong { display: block; margin-bottom: 8px; overflow-wrap: anywhere; }
    .files { display: grid; gap: 6px; }
    .files button { text-align: left; padding: 8px; font-size: 13px; }
    .stage { position: relative; min-width: 0; background: #0f161d; overflow: hidden; }
    canvas { display: block; width: 100%; height: calc(100vh - 57px); touch-action: none; }
    .hud { position: absolute; left: 12px; top: 12px; max-width: min(820px, calc(100% - 24px)); padding: 10px 12px; border-radius: 8px; background: rgba(15,22,29,.84); color: #dbe7ef; font-size: 13px; overflow-wrap: anywhere; }
    .tools { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .align { display: flex; align-items: center; gap: 6px; min-height: 42px; padding: 0 8px; border: 1px solid #cfd8e2; border-radius: 8px; background: #f8fafb; font-size: 13px; font-weight: 700; }
    .align input { width: 150px; accent-color: #087f8c; }
    .align output { min-width: 42px; text-align: right; }
    .nudge { min-width: 42px; padding: 0 10px; }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      aside { max-height: 220px; border-right: 0; border-bottom: 1px solid #d6dde5; }
      canvas { height: calc(100vh - 277px); }
    }
  </style>
</head>
<body>
  <header>
    <h1>JR Map Viewer</h1>
    <div class="tools">
      <button id="refresh">刷新</button>
      <button id="viewTop" class="active">俯视</button>
      <button id="viewFront">前视</button>
      <button id="viewRoam">漫游</button>
      <button id="axisX" class="nudge">X</button><button id="axisY" class="nudge">Y</button><button id="axisZ" class="nudge active">Z</button>
      <button id="alignLeft" class="nudge" title="逆时针 1°（Shift=5°）">↶</button>
      <label class="align">旋转 <input id="alignYaw" type="range" min="-180" max="180" step="1" value="0"><output id="alignYawValue">0°</output></label>
      <button id="alignRight" class="nudge" title="顺时针 1°（Shift=5°）">↷</button>
      <button id="reset" class="primary">居中</button>
    </div>
  </header>
  <main>
    <aside id="mapList">加载中...</aside>
    <section class="stage">
      <canvas id="canvas"></canvas>
      <div class="hud" id="hud">选择一个 PCD/PLY 文件</div>
    </section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");
    const maxDrawPoints = 180000;
    const alignStorageKey = "jrMapViewer.alignDeg";
    const alignAxisKey = "jrMapViewer.alignAxis";
    const keys = new Set();

    let rawPoints = [];
    let rawBounds = null;
    let points = [];
    let bounds = null;
    let alignAxis = localStorage.getItem(alignAxisKey) || "z";
    let alignYawDeg = Number(localStorage.getItem(alignStorageKey) || 0);
    let view = "top";
    let zoom = 60;
    let panX = 0;
    let panY = 0;
    let dragging = false;
    let last = [0, 0];
    let lastFrame = performance.now();
    let fps = 0;
    let fpsFrames = 0;
    let fpsTime = performance.now();
    let roam = { pos: [0, 0, 0], yaw: 0, pitch: 0, speed: 1.8, sensitivity: 0.0025 };

    function fmtSize(n) {
      if (n > 1024 * 1024) return `${(n / 1024 / 1024).toFixed(1)} MB`;
      return `${Math.max(1, Math.round(n / 1024))} KB`;
    }

    async function loadMaps() {
      const res = await fetch("/api/maps");
      const data = await res.json();
      const root = document.getElementById("mapList");
      root.innerHTML = data.maps.length ? "" : "暂无地图";
      for (const map of data.maps) {
        const div = document.createElement("div");
        div.className = "map";
        div.innerHTML = `<strong>${map.name}</strong><div class="files"></div>`;
        const files = div.querySelector(".files");
        const sorted = [...map.files].sort((a, b) => {
          const score = (f) => f.name.includes("downsampled") ? 0 : 1;
          return score(a) - score(b);
        });
        for (const f of sorted) {
          const btn = document.createElement("button");
          btn.textContent = `${f.name} · ${fmtSize(f.size)}`;
          btn.onclick = () => loadCloud(`/files/${encodeURIComponent(f.path).replaceAll("%2F", "/")}`, f.name);
          files.appendChild(btn);
        }
        root.appendChild(div);
        const first = sorted.find(f => f.name.includes("downsampled")) || sorted[0];
        if (!points.length && first) {
          setTimeout(() => loadCloud(`/files/${encodeURIComponent(first.path).replaceAll("%2F", "/")}`, first.name), 100);
        }
      }
    }

    function asciiHeader(buffer) {
      const bytes = new Uint8Array(buffer);
      const needle = [68, 65, 84, 65, 32]; // "DATA "
      for (let i = 0; i < Math.min(bytes.length - 12, 8192); i++) {
        let ok = true;
        for (let j = 0; j < needle.length; j++) if (bytes[i + j] !== needle[j]) ok = false;
        if (ok) {
          let eol = i;
          while (eol < bytes.length && bytes[eol] !== 10) eol++;
          return {
            text: new TextDecoder("utf-8").decode(bytes.slice(0, eol + 1)),
            dataOffset: eol + 1,
          };
        }
      }
      throw new Error("PCD header DATA line not found");
    }

    function parsePcd(buffer) {
      const { text, dataOffset } = asciiHeader(buffer);
      const pointsTotal = Number((text.match(/POINTS\s+(\d+)/) || [])[1] || 0);
      const fields = (text.match(/FIELDS\s+(.+)/) || [,""])[1].trim().split(/\s+/);
      const hasRgb = fields.includes("rgb") || fields.includes("rgba");
      if (!pointsTotal) throw new Error("PCD POINTS is 0 or missing");
      const stride = fields.length * 4;
      const step = Math.max(1, Math.ceil(pointsTotal / maxDrawPoints));
      const view = new DataView(buffer, dataOffset);
      const out = [];
      for (let i = 0; i < pointsTotal; i += step) {
        const off = i * stride;
        if (off + 12 > view.byteLength) break;
        const x = view.getFloat32(off, true);
        const y = view.getFloat32(off + 4, true);
        const z = view.getFloat32(off + 8, true);
        let r = 120, g = 220, b = 255;
        if (hasRgb && off + 16 <= view.byteLength) {
          const rgb = view.getUint32(off + 12, true);
          r = (rgb >> 16) & 255;
          g = (rgb >> 8) & 255;
          b = rgb & 255;
        }
        if (Number.isFinite(x) && Number.isFinite(y) && Number.isFinite(z)) out.push([x, y, z, r, g, b]);
      }
      return { points: out, total: pointsTotal };
    }

    function parsePly(text) {
      const lines = text.split(/\r?\n/);
      const end = lines.findIndex(l => l.trim() === "end_header");
      const countLine = lines.find(l => l.startsWith("element vertex"));
      const total = Number(countLine?.split(/\s+/)[2] || 0);
      const step = Math.max(1, Math.ceil(total / maxDrawPoints));
      const out = [];
      for (let i = 0; i < total; i += step) {
        const v = lines[end + 1 + i]?.trim().split(/\s+/).map(Number);
        if (!v || v.length < 3) continue;
        out.push([v[0], v[1], v[2], v[3] ?? 120, v[4] ?? 220, v[5] ?? 255]);
      }
      return { points: out, total };
    }

    async function loadCloud(url, name) {
      try {
        hud.textContent = `加载 ${name}...`;
        const res = await fetch(url, { cache: "no-store" });
        const parsed = name.endsWith(".pcd") ? parsePcd(await res.arrayBuffer()) : parsePly(await res.text());
        rawPoints = parsed.points;
        rawBounds = computeBounds(rawPoints);
        applyAlignment(false);
        resetView(false);
        hud.textContent = statusText(name, parsed.total);
        draw();
      } catch (err) {
        hud.textContent = `加载失败：${err.message}`;
      }
    }

    function computeBounds(ps) {
      const min = [Infinity, Infinity, Infinity], max = [-Infinity, -Infinity, -Infinity];
      for (const p of ps) for (let i = 0; i < 3; i++) { min[i] = Math.min(min[i], p[i]); max[i] = Math.max(max[i], p[i]); }
      return { min, max, center: min.map((v, i) => (v + max[i]) / 2), span: max.map((v, i) => v - min[i]) };
    }

    function applyAlignment(redraw = true) {
      if (!rawPoints.length || !rawBounds) {
        points = [];
        bounds = null;
        return;
      }
      const angle = alignYawDeg * Math.PI / 180;
      const ca = Math.cos(angle);
      const sa = Math.sin(angle);
      const c = rawBounds.center;
      points = rawPoints.map(p => {
        const dx = p[0] - c[0];
        const dy = p[1] - c[1];
        const dz = p[2] - c[2];
        if (alignAxis === "z") {
          return [c[0] + dx * ca - dy * sa, c[1] + dx * sa + dy * ca, p[2], p[3], p[4], p[5]];
        } else if (alignAxis === "x") {
          return [p[0], c[1] + dy * ca - dz * sa, c[2] + dy * sa + dz * ca, p[3], p[4], p[5]];
        } else {
          return [c[0] + dx * ca - dz * sa, p[1], c[2] + dx * sa + dz * ca, p[3], p[4], p[5]];
        }
      });
      bounds = computeBounds(points);
      if (redraw) resetView(true);
    }

    function setAlignment(deg) {
      alignYawDeg = Math.max(-180, Math.min(180, Math.round(deg)));
      localStorage.setItem(alignStorageKey, String(alignYawDeg));
      document.getElementById("alignYaw").value = String(alignYawDeg);
      document.getElementById("alignYawValue").textContent = `${alignYawDeg}°`;
      applyAlignment(true);
    }

    function statusText(name = "map", total = points.length) {
      if (view === "roam") return `${name} - ${points.length}/${total} points - click view to lock mouse, WASD move, Q/E up/down, Esc unlock`;
      return `${name} - ${points.length}/${total} points - drag to pan, wheel to zoom`;
    }

    function resize() {
      const ratio = devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      draw();
    }

    function resetView(show = true) {
      if (bounds) {
        const sx = view === "top" ? bounds.span[0] : bounds.span[0];
        const sy = view === "top" ? bounds.span[1] : bounds.span[2];
        zoom = Math.max(8, Math.min(160, Math.min(canvas.width / Math.max(0.1, sx * 1.25), canvas.height / Math.max(0.1, sy * 1.25))));
        roam.pos = [bounds.center[0], bounds.center[1], bounds.min[2] + Math.max(1.2, bounds.span[2] * 0.38)];
        roam.yaw = 0;
        roam.pitch = 0;
      }
      panX = 0;
      panY = 0;
      if (show) draw();
    }

    function projectOrtho(p) {
      const c = bounds?.center || [0, 0, 0];
      const x = p[0] - c[0];
      const y = p[1] - c[1];
      const z = p[2] - c[2];
      if (view === "front") return [canvas.width / 2 + panX + x * zoom, canvas.height / 2 + panY - z * zoom, 1];
      return [canvas.width / 2 + panX + x * zoom, canvas.height / 2 + panY - y * zoom, 1];
    }

    function roamBasis() {
      const sy = Math.sin(roam.yaw);
      const cy = Math.cos(roam.yaw);
      return {
        forward: [sy, cy, 0],
        right: [cy, -sy, 0],
      };
    }

    function projectRoam(p) {
      const dx = p[0] - roam.pos[0];
      const dy = p[1] - roam.pos[1];
      const dz = p[2] - roam.pos[2];
      const basis = roamBasis();
      const camX = dx * basis.right[0] + dy * basis.right[1];
      const camY = dx * basis.forward[0] + dy * basis.forward[1];
      const cp = Math.cos(roam.pitch), sp = Math.sin(roam.pitch);
      const depth = cp * camY + sp * dz;
      const vertical = -sp * camY + cp * dz;
      if (depth <= 0.08) return null;
      const f = Math.min(canvas.width, canvas.height) * 0.72;
      return [canvas.width / 2 + (camX / depth) * f, canvas.height / 2 - (vertical / depth) * f, depth];
    }

    function drawGrid() {
      if (view === "roam") return;
      ctx.save();
      ctx.strokeStyle = "rgba(148,163,184,.18)";
      ctx.lineWidth = 1;
      const stepPx = zoom >= 60 ? zoom : zoom * 2;
      for (let x = (canvas.width / 2 + panX) % stepPx; x < canvas.width; x += stepPx) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = (canvas.height / 2 + panY) % stepPx; y < canvas.height; y += stepPx) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
      ctx.restore();
    }

    function draw() {
      if (!ctx) return;
      ctx.fillStyle = "#0f161d";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFps();
      if (!points.length || !bounds) return;
      if (view === "roam") {
        drawRoam();
        drawFps();
        return;
      }
      const size = points.length > 120000 ? 1 : 2;
      for (const p of points) {
        const [x, y] = projectOrtho(p);
        if (x < -4 || y < -4 || x > canvas.width + 4 || y > canvas.height + 4) continue;
        ctx.fillStyle = `rgb(${p[3]},${p[4]},${p[5]})`;
        ctx.fillRect(x, y, size, size);
      }
    }

    function drawRoam() {
      const projected = [];
      for (const p of points) {
        const q = projectRoam(p);
        if (!q) continue;
        const [x, y, d] = q;
        if (x < -20 || y < -20 || x > canvas.width + 20 || y > canvas.height + 20) continue;
        projected.push([x, y, d, p[3], p[4], p[5]]);
      }
      projected.sort((a, b) => b[2] - a[2]);
      for (const p of projected) {
        const size = Math.max(1, Math.min(5, 18 / p[2]));
        ctx.globalAlpha = Math.max(0.28, Math.min(1, 8 / p[2]));
        ctx.fillStyle = `rgb(${p[3]},${p[4]},${p[5]})`;
        ctx.fillRect(p[0], p[1], size, size);
      }
      ctx.globalAlpha = 1;
    }

    function drawFps() {
      ctx.save();
      ctx.font = '13px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText(fps + ' fps', canvas.width - 70, canvas.height - 12);
      ctx.restore();
    }

    function tick(now) {
      const dt = Math.min(0.05, (now - lastFrame) / 1000);
      lastFrame = now;
      fpsFrames++;
      if (now - fpsTime >= 1000) { fps = fpsFrames; fpsFrames = 0; fpsTime = now; }
      if (view === "roam" && keys.size) {
        const { forward, right } = roamBasis();
        const move = [0, 0, 0];
        if (keys.has("w")) { move[0] += forward[0]; move[1] += forward[1]; }
        if (keys.has("s")) { move[0] -= forward[0]; move[1] -= forward[1]; }
        if (keys.has("d")) { move[0] += right[0]; move[1] += right[1]; }
        if (keys.has("a")) { move[0] -= right[0]; move[1] -= right[1]; }
        if (keys.has("e")) move[2] += 1;
        if (keys.has("q")) move[2] -= 1;
        const len = Math.hypot(move[0], move[1], move[2]) || 1;
        const speed = roam.speed * (keys.has("shift") ? 2.5 : 1);
        roam.pos[0] += move[0] / len * speed * dt;
        roam.pos[1] += move[1] / len * speed * dt;
        roam.pos[2] += move[2] / len * speed * dt;
        draw();
      }
      requestAnimationFrame(tick);
    }

    canvas.addEventListener("pointerdown", e => {
      if (view === "roam") {
        canvas.requestPointerLock?.();
        return;
      }
      dragging = true;
      last = [e.clientX, e.clientY];
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener("pointermove", e => {
      if (!dragging) return;
      const ratio = devicePixelRatio || 1;
      const dx = e.clientX - last[0];
      const dy = e.clientY - last[1];
      panX += dx * ratio;
      panY += dy * ratio;
      last = [e.clientX, e.clientY];
      draw();
    });
    canvas.addEventListener("pointerup", () => dragging = false);
    canvas.addEventListener("pointercancel", () => dragging = false);
    canvas.addEventListener("wheel", e => {
      e.preventDefault();
      if (view === "roam") roam.speed = Math.max(0.2, Math.min(12, roam.speed * (e.deltaY > 0 ? 0.85 : 1.18)));
      else zoom *= e.deltaY > 0 ? 0.88 : 1.12;
      draw();
    }, { passive: false });
    window.addEventListener("keydown", e => {
      const k = e.key.toLowerCase();
      if (["w","a","s","d","q","e","shift"].includes(k)) { keys.add(k); e.preventDefault(); }
    });
    window.addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));
    document.addEventListener("mousemove", e => {
      if (view !== "roam" || document.pointerLockElement !== canvas) return;
      roam.yaw += e.movementX * roam.sensitivity;
      roam.pitch = Math.max(-1.2, Math.min(1.2, roam.pitch - e.movementY * roam.sensitivity));
      draw();
    });
    document.addEventListener("pointerlockchange", () => {
      if (view === "roam") hud.textContent = document.pointerLockElement === canvas ? "FPS mouse locked - Esc unlocks, WASD move, Q/E up/down" : statusText();
    });
    window.addEventListener("resize", resize);
    document.getElementById("refresh").onclick = loadMaps;
    document.getElementById("reset").onclick = () => resetView(true);
    document.getElementById("alignYaw").oninput = e => setAlignment(Number(e.target.value));
    document.getElementById("alignLeft").onclick = e => setAlignment(alignYawDeg - (e.shiftKey ? 5 : 1));
    document.getElementById("alignRight").onclick = e => setAlignment(alignYawDeg + (e.shiftKey ? 5 : 1));
    function setAxis(axis) {
      alignAxis = axis;
      localStorage.setItem(alignAxisKey, axis);
      for (const a of ["axisX","axisY","axisZ"]) document.getElementById(a).classList.remove("active");
      document.getElementById("axis" + axis.toUpperCase()).classList.add("active");
      applyAlignment(true);
    }
    document.getElementById("axisX").onclick = () => setAxis("x");
    document.getElementById("axisY").onclick = () => setAxis("y");
    document.getElementById("axisZ").onclick = () => setAxis("z");
    setAxis(alignAxis);
    function setView(next) {
      if (document.pointerLockElement === canvas && next !== "roam") document.exitPointerLock?.();
      view = next;
      for (const id of ["viewTop", "viewFront", "viewRoam"]) document.getElementById(id).classList.remove("active");
      document.getElementById(next === "top" ? "viewTop" : next === "front" ? "viewFront" : "viewRoam").classList.add("active");
      resetView(true);
      hud.textContent = statusText();
    }
    document.getElementById("viewTop").onclick = () => setView("top");
    document.getElementById("viewFront").onclick = () => setView("front");
    document.getElementById("viewRoam").onclick = () => setView("roam");
    setAlignment(alignYawDeg);
    resize();
    loadMaps();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
